version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: retail_postventa
    description: "Raw CSV data loaded from synthetic generators (Módulo 1 + 2)."
    tables:
      - name: raw_orders
        description: "Órdenes e-commerce (10 000 filas)."
      - name: raw_shipments
        description: "Despachos 1:1 con órdenes."
      - name: raw_contacts
        description: "Contactos postventa (~35% de las órdenes)."
      - name: raw_returns
        description: "Devoluciones (~12% de las órdenes)."
      - name: raw_surveys
        description: "Encuestas post-contacto (~60% de los atendidos)."
